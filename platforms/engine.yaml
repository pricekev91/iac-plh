name: engine
project: prod

container:
  name: engine
  image: ubuntu:24.04
  profiles:
    - default
    - gpu
  mounts:
    - host: /home/pricekev/ai/models
      container: /srv/ai/models
      readonly: true
  env:
    AI_ENGINE_WEBUI_PORT: "8080"
    AI_ENGINE_LOCALAI_PORT: "8080"
    AI_ENGINE_DEFAULT_MODEL: qwopus3.6-35b-a3b-v1
    AI_ENGINE_DEFAULT_MODEL_URL: ""
    AI_ENGINE_DEFAULT_MODEL_PATH: /srv/ai/models/llama-cpp/models/Qwopus3.6-35B-A3B-v1-GGUF/Qwopus3.6-35B-A3B-v1-Q4_K_M.gguf
    AI_ENGINE_PULL_DEFAULT_MODEL: "false"
    AI_ENGINE_LLAMA_CONTEXT_SIZE: "32768"
    AI_ENGINE_LLAMA_GPU_LAYERS: "60"
    AI_ENGINE_LLAMA_THREADS: "8"
    AI_ENGINE_LLAMA_BATCH_SIZE: "512"
    AI_ENGINE_LLAMA_PARALLEL: "2"
    AI_ENGINE_LLAMA_FLASH_ATTN: "true"
    AI_ENGINE_LLAMA_NO_MMAP: "false"
    AI_ENGINE_LLAMA_MLOCK: "false"
    AI_ENGINE_LLAMA_CACHE_TYPE: q4_0
    AI_ENGINE_REQUIRE_NVIDIA: "true"
    AI_ENGINE_NVIDIA_GPU_NAME: RTX 2060M
  command: /usr/local/bin/ai-engine-localai-start

runtime:
  service_name: ai-engine-localai
  install_script: scripts/provision-ai-appliance.bash

ports:
  - host: 8080
    container: 8080
    bind_local_only: false
